<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>48HFP Film Ranker</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
  <button id="nav-select" class="active" onclick="showPage('select')">Select Films</button>
  <button id="nav-swipe" onclick="showPage('swipe')">Compare</button>
  <button id="nav-board" onclick="showPage('board')">Leaderboard</button>
  <button id="nav-stats" onclick="showPage('stats')">Stats</button>
  <a href="https://github.com/mariogeiger/48hfp-arena" target="_blank" class="nav-source"><svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
</nav>

<!-- PAGE 1: SELECT -->
<div id="page-select" class="page active">
  <div class="select-header">
    <p>Select the films you remember, then compare them head-to-head.</p>
    <input class="search-box" type="text" placeholder="Search films, teams, cities..." oninput="filterFilms(this.value)">
    <div class="select-actions">
      <button onclick="selectAll()">Select All</button>
      <button onclick="deselectAll()">Deselect All</button>
    </div>
  </div>
  <div class="film-list" id="film-list"></div>
  <div class="selection-status" id="selection-status">Select at least 2 films to compare</div>
</div>

<!-- PAGE 2: SWIPE -->
<div id="page-swipe" class="page">
  <div class="swipe-container" id="swipe-container"></div>
</div>

<!-- PAGE 3: LEADERBOARD -->
<div id="page-board" class="page">
  <div class="page-header">
    <h1>Leaderboard</h1>
    <p>Elo rankings based on all user votes</p>
  </div>
  <div class="board-list" id="board-list"></div>
</div>

<!-- PAGE 4: STATS -->
<div id="page-stats" class="page">
  <div class="page-header">
    <h1>Statistics</h1>
    <p>Voting activity and participation numbers</p>
  </div>
  <div id="stats-content"></div>
</div>

<div class="vote-toast-container" id="toast-container"></div>

<script src="/app.js"></script>
</body>
</html>
