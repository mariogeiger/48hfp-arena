<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>48HFP Film Ranker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .page { display: none; min-height: 100dvh; }
  .page.active { display: flex; flex-direction: column; }

  /* NAV */
  .nav {
    display: flex; gap: 0; border-bottom: 1px solid #222;
    background: #111118; position: sticky; top: 0; z-index: 100;
  }
  .nav button {
    flex: 1; padding: 14px 8px; background: none; border: none;
    color: #666; font-size: 14px; font-weight: 600; cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .nav button.active { color: #7c6aff; border-bottom-color: #7c6aff; }
  .nav button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* PAGE 1: SELECTION */
  #page-select { padding: 0; }
  .select-header {
    padding: 10px 16px 8px; background: #111118;
    position: sticky; top: 47px; z-index: 50;
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  }
  .select-header p { font-size: 12px; color: #888; width: 100%; }
  .search-box {
    flex: 1; min-width: 0; padding: 8px 12px; background: #1a1a24; border: 1px solid #333;
    border-radius: 8px; color: #fff; font-size: 14px; outline: none;
  }
  .search-box:focus { border-color: #7c6aff; }
  .select-actions {
    display: flex; gap: 6px;
  }
  .select-actions button {
    padding: 8px 10px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a24; color: #aaa; font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .select-actions button:hover { border-color: #7c6aff; color: #fff; }

  .film-list {
    flex: 1; overflow-y: auto; padding: 8px 16px 100px;
  }
  .film-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; margin-bottom: 4px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
  }
  .film-item:hover { background: #1a1a24; }
  .film-item.selected { background: #1c1a30; }
  .film-poster {
    width: 44px; height: 62px; border-radius: 6px; object-fit: cover;
    background: #1a1a24; flex-shrink: 0;
  }
  .film-poster-placeholder {
    width: 44px; height: 62px; border-radius: 6px;
    background: linear-gradient(135deg, #1a1a24, #252530);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 18px; color: #444;
  }
  .film-check {
    width: 22px; height: 22px; border-radius: 6px; border: 2px solid #444;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .film-item.selected .film-check {
    background: #7c6aff; border-color: #7c6aff;
  }
  .film-check::after {
    content: ''; display: none; width: 6px; height: 10px;
    border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  .film-item.selected .film-check::after { display: block; }
  .film-info { flex: 1; min-width: 0; }
  .film-title { font-size: 15px; font-weight: 600; color: #fff; }
  .film-meta { font-size: 12px; color: #777; margin-top: 2px; }

  .confirm-btn {
    position: fixed; bottom: 20px; left: 16px; right: 16px;
    padding: 16px; border-radius: 12px; border: none;
    background: #7c6aff; color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; z-index: 200; transition: opacity 0.2s;
  }
  .confirm-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* PAGE 2: SWIPE */
  #page-swipe {
    align-items: center; justify-content: center; padding: 10px;
  }
  .swipe-container {
    position: relative; width: 100%; max-width: 380px;
    flex: 1; display: flex; align-items: center; justify-content: center;
  }
  .swipe-card {
    width: 100%; background: #16161f; border-radius: 16px;
    padding: 16px 20px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    touch-action: pan-y; user-select: none;
    transition: transform 0.08s ease-out, opacity 0.3s;
    position: relative;
  }
  .swipe-card .vs-label {
    font-size: 11px; color: #555; text-transform: uppercase;
    letter-spacing: 3px; margin: 8px 0;
  }
  .swipe-film {
    padding: 8px 0;
  }
  .swipe-poster {
    width: 72px; height: 100px; border-radius: 6px; object-fit: cover;
    margin: 0 auto 8px; display: block; background: #1a1a24;
  }
  .swipe-poster-placeholder {
    width: 72px; height: 100px; border-radius: 6px;
    background: linear-gradient(135deg, #1a1a24, #252530);
    margin: 0 auto 8px; display: flex; align-items: center;
    justify-content: center; font-size: 24px; color: #333;
  }
  .swipe-film .title { font-size: 18px; font-weight: 700; color: #fff; }
  .swipe-film .meta { font-size: 12px; color: #888; margin-top: 4px; }
  .swipe-arrow-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%; border: 2px solid #333;
    background: #1a1a24; color: #888; font-size: 18px; cursor: pointer;
    margin-top: 6px; transition: all 0.15s;
  }
  .swipe-arrow-btn:hover { border-color: #7c6aff; color: #fff; background: #252530; }
  .swipe-arrow-btn.pick-a { border-color: #51cf66; color: #51cf66; }
  .swipe-arrow-btn.pick-a:hover { background: #51cf6622; }
  .swipe-arrow-btn.pick-b { border-color: #ff6b6b; color: #ff6b6b; }
  .swipe-arrow-btn.pick-b:hover { background: #ff6b6b22; }

  .swipe-overlay {
    position: absolute; top: 10px; font-size: 22px; font-weight: 900;
    padding: 6px 14px; border-radius: 8px; border: 3px solid;
    transform: rotate(-15deg); opacity: 0; pointer-events: none;
    transition: opacity 0.1s;
  }
  .swipe-overlay.left-o {
    left: 20px; color: #ff6b6b; border-color: #ff6b6b;
  }
  .swipe-overlay.right-o {
    right: 20px; color: #51cf66; border-color: #51cf66; transform: rotate(15deg);
  }

  .swipe-progress {
    margin-top: 8px; font-size: 12px; color: #555; text-align: center;
  }
  .swipe-done {
    text-align: center;
  }
  .swipe-done h2 { font-size: 24px; color: #fff; margin-bottom: 8px; }
  .swipe-done p { color: #888; margin-bottom: 20px; }
  .swipe-done button {
    padding: 14px 32px; border-radius: 10px; border: none;
    background: #7c6aff; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }

  .skip-btn {
    margin-top: 12px; background: none; border: 1px solid #333;
    color: #666; padding: 8px 20px; border-radius: 8px;
    font-size: 13px; cursor: pointer;
  }
  .skip-btn:hover { border-color: #555; color: #aaa; }

  /* PAGE 3: LEADERBOARD */
  #page-board { padding: 0; }
  .board-header {
    padding: 20px 16px 12px; background: #111118;
    position: sticky; top: 47px; z-index: 50;
  }
  .board-header h1 { font-size: 22px; color: #fff; }
  .board-header p { font-size: 13px; color: #888; margin-top: 4px; }

  .board-list { padding: 8px 16px 40px; }
  .board-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 12px; border-bottom: 1px solid #1a1a24;
  }
  .board-rank {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
    background: #1a1a24; color: #888;
  }
  .board-item:nth-child(1) .board-rank { background: #ffd43b22; color: #ffd43b; }
  .board-item:nth-child(2) .board-rank { background: #adb5bd22; color: #adb5bd; }
  .board-item:nth-child(3) .board-rank { background: #e8845422; color: #e88454; }
  .board-poster {
    width: 36px; height: 50px; border-radius: 4px; object-fit: cover;
    background: #1a1a24; flex-shrink: 0;
  }
  .board-poster-placeholder {
    width: 36px; height: 50px; border-radius: 4px;
    background: linear-gradient(135deg, #1a1a24, #252530);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; color: #333;
  }
  .board-info { flex: 1; min-width: 0; }
  .board-title { font-size: 15px; font-weight: 600; color: #fff; }
  .board-meta { font-size: 12px; color: #777; margin-top: 2px; }
  .board-stats { text-align: right; flex-shrink: 0; }
  .board-elo { font-size: 18px; font-weight: 700; color: #7c6aff; }
  .board-record { font-size: 11px; color: #666; margin-top: 2px; }

  .board-empty {
    text-align: center; padding: 60px 20px; color: #555;
  }
  .board-empty h3 { color: #888; margin-bottom: 8px; }

  /* PAGE 4: STATS */
  #page-stats { padding: 0; }
  .stats-header {
    padding: 20px 16px 12px; background: #111118;
    position: sticky; top: 47px; z-index: 50;
  }
  .stats-header h1 { font-size: 22px; color: #fff; }
  .stats-header p { font-size: 13px; color: #888; margin-top: 4px; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; padding: 16px;
  }
  .stat-card {
    background: #16161f; border-radius: 12px; padding: 20px 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 32px; font-weight: 800; color: #7c6aff;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px; color: #888; margin-top: 8px;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .stats-section {
    padding: 0 16px 24px;
  }
  .stats-section h3 {
    font-size: 15px; color: #aaa; margin-bottom: 12px;
    padding-top: 8px; border-top: 1px solid #1a1a24;
  }
  .stats-bar-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; font-size: 13px;
  }
  .stats-bar-label {
    flex: 0 0 140px; color: #ccc; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .stats-bar-track {
    flex: 1; height: 20px; background: #1a1a24; border-radius: 4px;
    overflow: hidden;
  }
  .stats-bar-fill {
    height: 100%; background: #7c6aff; border-radius: 4px;
    transition: width 0.5s ease;
  }
  .stats-bar-value {
    flex: 0 0 36px; text-align: right; color: #888; font-size: 12px;
  }

  /* VOTE NOTIFICATIONS */
  .vote-toast-container {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; flex-direction: column-reverse; align-items: center;
    padding: 12px; gap: 8px; pointer-events: none; z-index: 9999;
  }
  .vote-toast {
    background: #1e1e2e; border: 1px solid #333; border-left: 3px solid #7c6aff;
    padding: 10px 16px; border-radius: 8px; color: #ccc; font-size: 13px;
    max-width: 400px; width: 100%;
    animation: toast-in 0.3s ease, toast-out 0.4s ease 3.6s forwards;
    pointer-events: auto;
  }
  .vote-toast strong { color: #fff; }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(10px); }
  }

  @media (min-width: 600px) {
    .film-list { columns: 2; column-gap: 8px; }
    .film-item { break-inside: avoid; }
  }
</style>
</head>
<body>

<nav class="nav">
  <button id="nav-select" class="active" onclick="showPage('select')">Select Films</button>
  <button id="nav-swipe" onclick="showPage('swipe')">Compare</button>
  <button id="nav-board" onclick="showPage('board')">Leaderboard</button>
  <button id="nav-stats" onclick="showPage('stats')">Stats</button>
</nav>

<!-- PAGE 1: SELECT -->
<div id="page-select" class="page active">
  <div class="select-header">
    <p>Select the films you remember, then compare them head-to-head.</p>
    <input class="search-box" type="text" placeholder="Search films, teams, cities..." oninput="filterFilms(this.value)">
    <div class="select-actions">
      <button onclick="selectAll()">Select All</button>
      <button onclick="deselectAll()">Deselect All</button>
    </div>
  </div>
  <div class="film-list" id="film-list"></div>
  <button class="confirm-btn" id="confirm-btn" disabled onclick="confirmSelection()">
    Continue with 0 films
  </button>
</div>

<!-- PAGE 2: SWIPE -->
<div id="page-swipe" class="page">
  <div class="swipe-container" id="swipe-container">
    <!-- filled by JS -->
  </div>
</div>

<!-- PAGE 3: LEADERBOARD -->
<div id="page-board" class="page">
  <div class="board-header">
    <h1>Leaderboard</h1>
    <p>Elo rankings based on all user votes</p>
  </div>
  <div class="board-list" id="board-list"></div>
</div>

<!-- PAGE 4: STATS -->
<div id="page-stats" class="page">
  <div class="stats-header">
    <h1>Statistics</h1>
    <p>Voting activity and participation numbers</p>
  </div>
  <div id="stats-content"></div>
</div>

<div class="vote-toast-container" id="toast-container"></div>

<script>
const USER_ID = localStorage.getItem('filmrank_uid') || (() => {
  const id = crypto.randomUUID();
  localStorage.setItem('filmrank_uid', id);
  return id;
})();

let allFilms = [];
let selectedIds = new Set(JSON.parse(localStorage.getItem('filmrank_selected') || '[]'));
let currentPair = null;
let voteCount = parseInt(localStorage.getItem('filmrank_votes') || '0');

// -- Init --
async function init() {
  const res = await fetch('/api/films');
  allFilms = await res.json();
  renderFilmList(allFilms);
  updateConfirmBtn();
}

// -- Page Navigation --
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.getElementById(`nav-${page}`).classList.add('active');

  if (page === 'swipe') loadPair();
  if (page === 'board') loadLeaderboard();
  if (page === 'stats') loadStats();
}

// -- PAGE 1: Film Selection --
function renderFilmList(films) {
  const container = document.getElementById('film-list');
  container.innerHTML = films.map(f => `
    <div class="film-item ${selectedIds.has(f.id) ? 'selected' : ''}"
         data-id="${f.id}" onclick="toggleFilm(${f.id}, this)">
      <div class="film-check"></div>
      ${posterImg(f.poster_url, 'film-poster', 'film-poster-placeholder')}
      <div class="film-info">
        <div class="film-title">${esc(f.title)}</div>
        <div class="film-meta">${esc(f.team)}${f.city ? ' &middot; ' + esc(f.city) : ''}</div>
      </div>
    </div>
  `).join('');
}

function toggleFilm(id, el) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    el.classList.remove('selected');
  } else {
    selectedIds.add(id);
    el.classList.add('selected');
  }
  updateConfirmBtn();
}

function filterFilms(q) {
  q = q.toLowerCase();
  const filtered = allFilms.filter(f =>
    f.title.toLowerCase().includes(q) ||
    f.team.toLowerCase().includes(q) ||
    f.city.toLowerCase().includes(q)
  );
  renderFilmList(filtered);
}

function selectAll() {
  document.querySelectorAll('.film-item').forEach(el => {
    const id = parseInt(el.dataset.id);
    selectedIds.add(id);
    el.classList.add('selected');
  });
  updateConfirmBtn();
}

function deselectAll() {
  selectedIds.clear();
  document.querySelectorAll('.film-item').forEach(el => el.classList.remove('selected'));
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirm-btn');
  const n = selectedIds.size;
  btn.disabled = n < 2;
  btn.textContent = `Continue with ${n} film${n !== 1 ? 's' : ''}`;
}

async function confirmSelection() {
  localStorage.setItem('filmrank_selected', JSON.stringify([...selectedIds]));
  await fetch('/api/selection', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: USER_ID, film_ids: [...selectedIds] }),
  });
  showPage('swipe');
}

// -- PAGE 2: Swipe Comparison --
async function loadPair() {
  const container = document.getElementById('swipe-container');
  const res = await fetch(`/api/pair?user_id=${USER_ID}`);
  const data = await res.json();

  if (data.error === 'unknown user') {
    container.innerHTML = `
      <div class="swipe-done">
        <h2>Select films first</h2>
        <p>Go back and pick the films you've watched.</p>
        <button onclick="showPage('select')">Select Films</button>
      </div>`;
    return;
  }

  if (data.done) {
    container.innerHTML = `
      <div class="swipe-done">
        <h2>All done!</h2>
        <p>You've compared all possible pairs. (${voteCount} votes cast)</p>
        <button onclick="showPage('board')">View Leaderboard</button>
      </div>`;
    return;
  }

  currentPair = data;
  container.innerHTML = `
    <div>
      <div class="swipe-card" id="swipe-card">
        <div class="swipe-overlay left-o" id="overlay-left">B</div>
        <div class="swipe-overlay right-o" id="overlay-right">A</div>
        <div class="swipe-film">
          ${posterImg(data.a.poster_url, 'swipe-poster', 'swipe-poster-placeholder')}
          <div class="title">${esc(data.a.title)}</div>
          <div class="meta">${esc(data.a.team)}${data.a.city ? ' &middot; ' + esc(data.a.city) : ''}</div>
          <button class="swipe-arrow-btn pick-a" onclick="castVote(currentPair.a.id, currentPair.b.id)" title="Pick this one">&rarr;</button>
        </div>
        <div class="vs-label">VS</div>
        <div class="swipe-film">
          ${posterImg(data.b.poster_url, 'swipe-poster', 'swipe-poster-placeholder')}
          <div class="title">${esc(data.b.title)}</div>
          <div class="meta">${esc(data.b.team)}${data.b.city ? ' &middot; ' + esc(data.b.city) : ''}</div>
          <button class="swipe-arrow-btn pick-b" onclick="castVote(currentPair.b.id, currentPair.a.id)" title="Pick this one">&larr;</button>
        </div>
      </div>
      <div class="swipe-progress">${voteCount} comparisons made</div>
      <div style="text-align:center">
        <button class="skip-btn" onclick="loadPair()">Skip this pair</button>
      </div>
    </div>`;

  setupSwipe();
}

// Track active listeners so we can clean them up
let swipeCleanup = null;

function setupSwipe() {
  // Remove previous listeners
  if (swipeCleanup) { swipeCleanup(); swipeCleanup = null; }

  const card = document.getElementById('swipe-card');
  if (!card) return;

  let startX = 0, currentX = 0, dragging = false;

  function onStart(x) {
    startX = x; currentX = 0; dragging = true;
    card.style.transition = 'none';
  }
  function onMouseMove(e) {
    if (!dragging) return;
    currentX = e.clientX - startX;
    card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`;
    const ol = document.getElementById('overlay-left');
    const or2 = document.getElementById('overlay-right');
    if (ol) ol.style.opacity = currentX < -30 ? Math.min(1, (-currentX - 30) / 80) : 0;
    if (or2) or2.style.opacity = currentX > 30 ? Math.min(1, (currentX - 30) / 80) : 0;
  }
  function onTouchMove(e) {
    if (!dragging) return;
    currentX = e.touches[0].clientX - startX;
    card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`;
    const ol = document.getElementById('overlay-left');
    const or2 = document.getElementById('overlay-right');
    if (ol) ol.style.opacity = currentX < -30 ? Math.min(1, (-currentX - 30) / 80) : 0;
    if (or2) or2.style.opacity = currentX > 30 ? Math.min(1, (currentX - 30) / 80) : 0;
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

    if (Math.abs(currentX) > 80) {
      const goRight = currentX > 0;
      card.style.transform = `translateX(${goRight ? 400 : -400}px) rotate(${goRight ? 20 : -20}deg)`;
      card.style.opacity = '0';
      setTimeout(() => {
        if (goRight) castVote(currentPair.a.id, currentPair.b.id);
        else castVote(currentPair.b.id, currentPair.a.id);
      }, 200);
    } else {
      card.style.transform = '';
      document.getElementById('overlay-left').style.opacity = 0;
      document.getElementById('overlay-right').style.opacity = 0;
    }
  }
  function onMouseDown(e) { onStart(e.clientX); }
  function onTouchStart(e) { onStart(e.touches[0].clientX); }
  function onKey(e) {
    if (e.key === 'ArrowRight') castVote(currentPair.a.id, currentPair.b.id);
    else if (e.key === 'ArrowLeft') castVote(currentPair.b.id, currentPair.a.id);
  }

  card.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onEnd);
  card.addEventListener('touchstart', onTouchStart, { passive: true });
  window.addEventListener('touchmove', onTouchMove, { passive: true });
  window.addEventListener('touchend', onEnd);
  document.addEventListener('keydown', onKey);

  swipeCleanup = () => {
    card.removeEventListener('mousedown', onMouseDown);
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('mouseup', onEnd);
    card.removeEventListener('touchstart', onTouchStart);
    window.removeEventListener('touchmove', onTouchMove);
    window.removeEventListener('touchend', onEnd);
    document.removeEventListener('keydown', onKey);
  };
}

async function castVote(winnerId, loserId) {
  voteCount++;
  localStorage.setItem('filmrank_votes', voteCount);
  await fetch('/api/vote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: USER_ID, winner_id: winnerId, loser_id: loserId }),
  });
  loadPair();
}

// -- PAGE 3: Leaderboard --
async function loadLeaderboard() {
  const res = await fetch('/api/leaderboard');
  const data = await res.json();
  const container = document.getElementById('board-list');

  if (data.length === 0) {
    container.innerHTML = `
      <div class="board-empty">
        <h3>No votes yet</h3>
        <p>Start comparing films to build the leaderboard!</p>
      </div>`;
    return;
  }

  container.innerHTML = data.map((item, i) => `
    <div class="board-item">
      <div class="board-rank">${i + 1}</div>
      ${posterImg(item.poster_url, 'board-poster', 'board-poster-placeholder')}
      <div class="board-info">
        <div class="board-title">${esc(item.title)}</div>
        <div class="board-meta">${esc(item.team)}${item.city ? ' &middot; ' + esc(item.city) : ''}</div>
      </div>
      <div class="board-stats">
        <div class="board-elo">${Math.round(item.rating)}</div>
        <div class="board-record">${item.wins}W - ${item.losses}L</div>
      </div>
    </div>
  `).join('');
}

// -- PAGE 4: Stats --
async function loadStats() {
  const res = await fetch('/api/stats');
  const s = await res.json();
  const container = document.getElementById('stats-content');

  const maxSelected = s.most_selected_films.length > 0
    ? s.most_selected_films[0].count : 1;

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">${s.total_votes}</div>
        <div class="stat-label">Total Votes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${s.active_users}</div>
        <div class="stat-label">Active Voters</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${s.total_users}</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${s.avg_votes_per_user}</div>
        <div class="stat-label">Avg Votes / User</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${s.films_with_votes}</div>
        <div class="stat-label">Films Voted On</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${s.total_films}</div>
        <div class="stat-label">Total Films</div>
      </div>
    </div>
    <div class="stats-section">
      <h3>Most Selected Films</h3>
      ${s.most_selected_films.map(f => `
        <div class="stats-bar-row">
          <div class="stats-bar-label" title="${esc(f.title)}">${esc(f.title)}</div>
          <div class="stats-bar-track">
            <div class="stats-bar-fill" style="width: ${(f.count / maxSelected * 100).toFixed(1)}%"></div>
          </div>
          <div class="stats-bar-value">${f.count}</div>
        </div>
      `).join('')}
    </div>
    ${s.vote_distribution.length > 0 ? `
    <div class="stats-section">
      <h3>Votes Per User Distribution</h3>
      ${s.vote_distribution.map(d => `
        <div class="stats-bar-row">
          <div class="stats-bar-label">${d.votes} vote${d.votes !== 1 ? 's' : ''}</div>
          <div class="stats-bar-track">
            <div class="stats-bar-fill" style="width: ${(d.users / s.active_users * 100).toFixed(1)}%"></div>
          </div>
          <div class="stats-bar-value">${d.users}</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function posterImg(url, cls, phCls) {
  if (!url) return `<div class="${phCls}">&#127902;</div>`;
  return `<img class="${cls}" src="${esc(url)}" loading="lazy" onerror="this.outerHTML='<div class=\\'${phCls}\\'>&#127902;</div>'">`;
}

// -- Vote Notifications (SSE) --
function initVoteStream() {
  const es = new EventSource('/api/vote/stream');
  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.user_id === USER_ID) return;
    showVoteToast(data.winner_title, data.loser_title);
  };
  es.onerror = () => {
    es.close();
    setTimeout(initVoteStream, 5000);
  };
}

function showVoteToast(winner, loser) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'vote-toast';
  toast.innerHTML = `Someone voted: <strong>${esc(winner)}</strong> over ${esc(loser)}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

initVoteStream();
init();
</script>
</body>
</html>
